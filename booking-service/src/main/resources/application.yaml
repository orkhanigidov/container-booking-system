server:
  port: 8081

spring:
  application:
    name: booking-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:bookingdb}
    username: ${DB_USER:booking}
    password: ${DB_PASS:booking}
    jpa:
      hibernate:
        ddl-auto: validate
    flyway:
      enabled: true
