name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and run tests
        run: ./gradlew build --no-daemon

      - name: Verify Docker builds
        run: |
          docker build -t booking-service:test -f booking-service/Dockerfile .
          docker build -t inventory-service:test -f inventory-service/Dockerfile .
          docker build -t payment-service:test -f payment-service/Dockerfile .
          docker build -t notification-service:test -f notification-service/Dockerfile .
